name: Publish upgrade artifacts to staging

on:
  push:
    branches:
      - release_stage
  workflow_dispatch:
    inputs:
      upgrade_from:
        description: 'Mirrors {upgrade_from, ...} in staging.config. Last hard-deployed staging version (must match an existing v<tag>). e.g. 2.9.4'
        required: true
        type: string
      upgrade_previous:
        description: 'Mirrors {upgrade_previous, ...} in staging.config. Version currently running on staging, including any prior soft deploys. e.g. 2.9.5'
        required: true
        type: string
      upgrade_to:
        description: 'Mirrors {upgrade_to, ...} in staging.config. Target version to deploy (must match an existing v<tag>, and differ from upgrade_previous for soft deploys). e.g. 2.9.6-rc.0'
        required: true
        type: string
      regions:
        description: 'Mirrors {regions, [...]} in staging.config. Comma-separated region list, or "all". e.g. all | us-east-1 | us-east-1,eu-west-2'
        required: true
        type: string
        default: 'all'
      type:
        description: 'Mirrors {type, ...} in staging.config. soft = release upgrade, hard = full restart.'
        required: true
        type: choice
        default: 'soft'
        options:
          - soft
          - hard
env:
  INCLUDE_ERTS: true
  MIX_ENV: prod
jobs:
  publish:
    runs-on: u22-arm-runner
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Elixir
        id: beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3.4"
          elixir-version: "1.18.2"
      - name: Set upgrade variables
        env:
          # Pass dispatch inputs via env (not direct ${{ }} interpolation) to
          # avoid shell injection. See
          # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-an-intermediate-environment-variable
          INPUT_FROM: ${{ inputs.upgrade_from }}
          INPUT_PREVIOUS: ${{ inputs.upgrade_previous }}
          INPUT_TO: ${{ inputs.upgrade_to }}
          INPUT_TYPE: ${{ inputs.type }}
          INPUT_REGIONS: ${{ inputs.regions }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Validate user-controlled inputs before they land in $GITHUB_ENV
            # or downstream filenames. Versions must point at an existing tag;
            # regions are checked against an allowlist.
            REG_RE='^[0-9a-z-]+$'
            # actions/checkout is shallow by default and skips tags.
            git fetch --tags origin --quiet
            for pair in "upgrade_from=$INPUT_FROM" "upgrade_previous=$INPUT_PREVIOUS" "upgrade_to=$INPUT_TO"; do
              name="${pair%%=*}"  # everything before the first '='
              val="${pair#*=}"    # everything after the first '='
              if ! git rev-parse --verify --quiet "refs/tags/v$val" >/dev/null; then
                echo "::error::input $name='$val' has no matching git tag v$val"
                exit 1
              fi
            done
            case "$INPUT_TYPE" in
              soft|hard) ;;
              *) echo "::error::input type='$INPUT_TYPE' must be soft|hard"; exit 1 ;;
            esac
            # Build the Erlang regions list for staging.config: [<<"r1">>, <<"r2">>]
            REGIONS_ERL=""
            IFS=',' read -ra RS <<< "$INPUT_REGIONS"
            for r in "${RS[@]}"; do
              r="${r// /}"
              if ! [[ "$r" =~ $REG_RE ]]; then
                echo "::error::input regions entry '$r' fails allowlist $REG_RE"
                exit 1
              fi
              REGIONS_ERL+="<<\"$r\">>, "
            done
            REGIONS_ERL="${REGIONS_ERL%, }"
            CONFIG=/tmp/dispatch.config
            cat > "$CONFIG" <<EOF
          [
              {upgrade_from, "$INPUT_FROM"},
              {upgrade_previous, "$INPUT_PREVIOUS"},
              {upgrade_to, "$INPUT_TO"},
              {regions, [$REGIONS_ERL]},
              {type, $INPUT_TYPE}
          ].
          EOF
          else
            CONFIG=./deploy/upgrade/staging.config
          fi
          elixir ./deploy/upgrade/handler.exs all_keys "$CONFIG"
          FROM=$(elixir ./deploy/upgrade/handler.exs upgrade_from "$CONFIG")
          PREVIOUS=$(elixir ./deploy/upgrade/handler.exs upgrade_previous "$CONFIG")
          TO=$(elixir ./deploy/upgrade/handler.exs upgrade_to "$CONFIG")
          TYPE_VAL=$(elixir ./deploy/upgrade/handler.exs type "$CONFIG")
          NAME_VAL=$(elixir ./deploy/upgrade/handler.exs name "$CONFIG")
          if [ "$TYPE_VAL" = "soft" ] && [ "$PREVIOUS" = "$TO" ]; then
            echo "::error::Soft deploy requires upgrade_previous ($PREVIOUS) to differ from upgrade_to ($TO)."
            exit 1
          fi
          printf 'RELEASE_BASE=%s\n' "$FROM"     >> "$GITHUB_ENV"
          printf 'RELEASE_FROM=%s\n' "$PREVIOUS" >> "$GITHUB_ENV"
          printf 'RELEASE_TO=%s\n'   "$TO"       >> "$GITHUB_ENV"
          printf 'TYPE=%s\n'         "$TYPE_VAL" >> "$GITHUB_ENV"
          printf 'NAME=%s\n'         "$NAME_VAL" >> "$GITHUB_ENV"
      - name: configure aws credentials - staging
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE }}
          aws-region: "us-east-1"
      - name: Fetch prebuilt artifact
        shell: bash
        run: |
          mkdir -p ./_build/${{ env.MIX_ENV }}
          if [ "${{ env.TYPE }}" = "hard" ]; then
            ARTIFACT="supavisor_hard_${{ env.RELEASE_TO }}.tar.gz"
          else
            ARTIFACT="supavisor_soft_${{ env.RELEASE_FROM }}_${{ env.RELEASE_TO }}.tar.gz"
          fi
          SRC="${{ secrets.PREBUILT_TARBALLS_PATH_STAGE }}/$ARTIFACT"
          DEST="${{ secrets.TARBALLS_PATH_STAGE }}/${{ env.NAME }}_$(date "+%s").tar.gz"
          # If a prebuilt tarball exists, the only transformation we apply is the
          # rename to the timestamped deploy name. Do it as a server-side S3 copy
          # so the bytes never round-trip through the runner. The cp is also the
          # existence check: an exact-key copy that fails falls through to build.
          if aws s3 cp "$SRC" "$DEST"; then
            echo "Using prebuilt artifact $ARTIFACT (server-side copy to $DEST)"
            echo "PREBUILT=true" >> $GITHUB_ENV
          else
            echo "No prebuilt artifact $ARTIFACT, will build from source"
            echo "PREBUILT=false" >> $GITHUB_ENV
          fi
      - name: Set up Rust
        if: env.PREBUILT != 'true'
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Get git tags
        if: env.PREBUILT != 'true'
        run: git fetch --tags origin
      - name: Checkout RELEASE_FROM
        if: env.PREBUILT != 'true' && env.TYPE == 'soft'
        run: git checkout v${{ env.RELEASE_FROM }}
      - name: Cache Mix
        if: env.PREBUILT != 'true' && env.TYPE == 'soft'
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Install dependencies
        if: env.PREBUILT != 'true' && env.TYPE == 'soft'
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Make old release
        if: env.PREBUILT != 'true' && env.TYPE == 'soft'
        run: mix release supavisor
      - name: Checkout RELEASE_TO
        if: env.PREBUILT != 'true'
        run: git checkout v${{ env.RELEASE_TO }}
      - name: Clean up old release(s)
        if: env.PREBUILT != 'true' && env.TYPE == 'soft'
        run: |
          rm -rf ./_build/${{ env.MIX_ENV }}/lib/supavisor
          rm -rf ./deps
          rm ./_build/${{ env.MIX_ENV }}/rel/supavisor/releases/COOKIE
          rm ./_build/${{ env.MIX_ENV }}/supavisor-${{ env.RELEASE_FROM }}.tar.gz
      - name: Cache Mix
        if: env.PREBUILT != 'true'
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Install dependencies
        if: env.PREBUILT != 'true'
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Make upgrade release
        if: env.PREBUILT != 'true' && env.TYPE == 'soft'
        run: RELEASE_COOKIE=${{ secrets.RELEASE_COOKIE_STAGE }} UPGRADE_FROM=${{ env.RELEASE_FROM }} mix release supavisor
      - name: Make hard ${{ env.RELEASE_TO }} release
        if: env.PREBUILT != 'true' && env.TYPE == 'hard'
        run: RELEASE_COOKIE=${{ secrets.RELEASE_COOKIE_STAGE }} mix release supavisor
      - name: Create tarball
        if: env.PREBUILT != 'true'
        run: cd _build/${{ env.MIX_ENV }} && mv supavisor-${{ env.RELEASE_TO }}.tar.gz "${{ env.NAME }}_$(date "+%s").tar.gz"
      - name: Deploy to S3
        if: env.PREBUILT != 'true'
        shell: bash
        run: aws s3 sync ./_build/${{ env.MIX_ENV }} ${{ secrets.TARBALLS_PATH_STAGE }} --exclude '*' --include '*tar.gz'
