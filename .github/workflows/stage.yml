name: Publish upgrade artifacts to staging

on:
  push:
    branches:
      - release_stage
  workflow_dispatch:
    inputs:
      upgrade_from:
        description: 'Base version on VM (last hard deploy). Must match an existing v<tag>.'
        required: true
        type: string
      upgrade_previous:
        description: 'Current version on VM (includes prior soft deploys). Usually same as upgrade_from. Must match an existing v<tag>.'
        required: true
        type: string
      upgrade_to:
        description: 'Target version. Must match an existing v<tag>. Must differ from upgrade_previous for soft deploys.'
        required: true
        type: string
      regions:
        description: 'Comma-separated region list, or "all".'
        required: true
        type: string
        default: 'all'
      type:
        description: 'Deploy type.'
        required: true
        type: choice
        default: 'soft'
        options:
          - soft
          - hard
env:
  INCLUDE_ERTS: true
  MIX_ENV: prod
jobs:
  publish:
    runs-on: u22-arm-runner
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Guard - dispatch must target release_stage
        if: github.event_name == 'workflow_dispatch' && github.ref_name != 'release_stage'
        run: |
          echo "::error::This workflow must be dispatched against the 'release_stage' branch."
          echo "::error::On the Actions page, open 'Run workflow' and pick 'release_stage' in the 'Use workflow from' dropdown."
          exit 1
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set upgrade variables
        run: |
            elixir ./deploy/upgrade/handler.exs all_keys ./deploy/upgrade/staging.config
            echo "RELEASE_FROM=$(elixir ./deploy/upgrade/handler.exs upgrade_from ./deploy/upgrade/staging.config)" >> $GITHUB_ENV
            echo "RELEASE_TO=$(elixir ./deploy/upgrade/handler.exs upgrade_to ./deploy/upgrade/staging.config)" >> $GITHUB_ENV
            echo "NAME=$(elixir ./deploy/upgrade/handler.exs name ./deploy/upgrade/staging.config)" >> $GITHUB_ENV
      - name: Setup Elixir
        id: beam
        uses: erlef/setup-beam@ee09b1e59bb240681c382eb1f0abc6a04af72764 # v1.23.0
        with:
          otp-version: '27.2.1'
          elixir-version: '1.18.2'
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Get git tags
        run: git fetch --tags origin
      - name: Checkout RELEASE_FROM
        run: git checkout v${{ env.RELEASE_FROM }}
      - name: Cache Mix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Make old release
        run: mix release supavisor
      - name: Checkout RELEASE_TO
        run: git checkout v${{ env.RELEASE_TO }}
      - name: Cache Mix
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Clean up old release
        run: |
          rm -rf ./_build/${{ env.MIX_ENV }}/lib/supavisor
          rm ./_build/${{ env.MIX_ENV }}/rel/supavisor/releases/COOKIE
          rm ./_build/${{ env.MIX_ENV }}/supavisor-${{ env.RELEASE_FROM }}.tar.gz
      - name: Make upgrade release
        run: RELEASE_COOKIE=${{ secrets.RELEASE_COOKIE_STAGE }} UPGRADE_FROM=${{ env.RELEASE_FROM }} mix release supavisor
      - name: Create tarball
        run: cd _build/${{ env.MIX_ENV }} && mv supavisor-${{ env.RELEASE_TO }}.tar.gz "${{ env.NAME }}_$(date "+%s").tar.gz"
      - name: configure aws credentials - staging
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE }}
          aws-region: "us-east-1"
      - name: Deploy to S3
        shell: bash
        run: aws s3 sync ./_build/${{ env.MIX_ENV }} ${{ secrets.TARBALLS_PATH_STAGE }} --exclude '*' --include '*tar.gz'
