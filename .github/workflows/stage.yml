name: Publish upgrade artifacts to staging

on:
  push:
    branches:
      - release_stage
  workflow_dispatch:
    inputs:
      upgrade_from:
        description: 'Base version on VM (last hard deploy). Must match an existing v<tag>.'
        required: true
        type: string
      upgrade_previous:
        description: 'Current version on VM (includes prior soft deploys). Usually same as upgrade_from. Must match an existing v<tag>.'
        required: true
        type: string
      upgrade_to:
        description: 'Target version. Must match an existing v<tag>. Must differ from upgrade_previous for soft deploys.'
        required: true
        type: string
      regions:
        description: 'Comma-separated region list, or "all".'
        required: true
        type: string
        default: 'all'
      type:
        description: 'Deploy type.'
        required: true
        type: choice
        default: 'soft'
        options:
          - soft
          - hard
env:
  INCLUDE_ERTS: true
  MIX_ENV: prod
jobs:
  publish:
    runs-on: u22-arm-runner
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Elixir
        id: beam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.2.1"
          elixir-version: "1.18.2"
      - name: Set upgrade variables
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FROM="${{ inputs.upgrade_from }}"
            PREVIOUS="${{ inputs.upgrade_previous }}"
            TO="${{ inputs.upgrade_to }}"
            TYPE_VAL="${{ inputs.type }}"
            # Mirror handler.exs name format: supavisor_<type>_<regions joined by '&'>_<from>_<to>
            REGIONS_SLUG="$(echo "${{ inputs.regions }}" | tr ',' '&' | tr -d ' ')"
            NAME_VAL="supavisor_${TYPE_VAL}_${REGIONS_SLUG}_${FROM}_${TO}"
            echo "Dispatched: from=$FROM previous=$PREVIOUS to=$TO type=$TYPE_VAL regions=${{ inputs.regions }}"
          else
            elixir ./deploy/upgrade/handler.exs all_keys ./deploy/upgrade/staging.config
            FROM=$(elixir ./deploy/upgrade/handler.exs upgrade_from ./deploy/upgrade/staging.config)
            PREVIOUS=$(elixir ./deploy/upgrade/handler.exs upgrade_previous ./deploy/upgrade/staging.config)
            TO=$(elixir ./deploy/upgrade/handler.exs upgrade_to ./deploy/upgrade/staging.config)
            TYPE_VAL=$(elixir ./deploy/upgrade/handler.exs type ./deploy/upgrade/staging.config)
            NAME_VAL=$(elixir ./deploy/upgrade/handler.exs name ./deploy/upgrade/staging.config)
          fi
          if [ "$TYPE_VAL" = "soft" ] && [ "$PREVIOUS" = "$TO" ]; then
            echo "::error::Soft deploy requires upgrade_previous ($PREVIOUS) to differ from upgrade_to ($TO)."
            exit 1
          fi
          echo "RELEASE_BASE=$FROM"     >> $GITHUB_ENV
          echo "RELEASE_FROM=$PREVIOUS" >> $GITHUB_ENV
          echo "RELEASE_TO=$TO"         >> $GITHUB_ENV
          echo "TYPE=$TYPE_VAL"         >> $GITHUB_ENV
          echo "NAME=$NAME_VAL"         >> $GITHUB_ENV
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
      - name: Get git tags
        run: git fetch --tags origin
      - name: Checkout RELEASE_FROM
        if: env.TYPE == 'soft'
        run: git checkout v${{ env.RELEASE_FROM }}
      - name: Cache Mix
        if: env.TYPE == 'soft'
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Install dependencies
        if: env.TYPE == 'soft'
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Make old release
        if: env.TYPE == 'soft'
        run: mix release supavisor
      - name: Checkout RELEASE_TO
        run: git checkout v${{ env.RELEASE_TO }}
      - name: Clean up old release(s)
        if: env.TYPE == 'soft'
        run: |
          rm -rf ./_build/${{ env.MIX_ENV }}/lib/supavisor
          rm -rf ./deps
          rm ./_build/${{ env.MIX_ENV }}/rel/supavisor/releases/COOKIE
          rm ./_build/${{ env.MIX_ENV }}/supavisor-${{ env.RELEASE_FROM }}.tar.gz
      - name: Cache Mix
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles(format('{0}{1}', github.workspace, '/mix.lock')) }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
      - name: Make upgrade release
        if: env.TYPE == 'soft'
        run: RELEASE_COOKIE=${{ secrets.RELEASE_COOKIE_STAGE }} UPGRADE_FROM=${{ env.RELEASE_FROM }} mix release supavisor
      - name: Make hard ${{ env.RELEASE_TO }} release
        if: env.TYPE == 'hard'
        run: RELEASE_COOKIE=${{ secrets.RELEASE_COOKIE_STAGE }} mix release supavisor
      - name: Create tarball
        run: cd _build/${{ env.MIX_ENV }} && mv supavisor-${{ env.RELEASE_TO }}.tar.gz "${{ env.NAME }}_$(date "+%s").tar.gz"
      - name: configure aws credentials - staging
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE }}
          aws-region: "us-east-1"
      - name: Deploy to S3
        shell: bash
        run: aws s3 sync ./_build/${{ env.MIX_ENV }} ${{ secrets.TARBALLS_PATH_STAGE }} --exclude '*' --include '*tar.gz'
